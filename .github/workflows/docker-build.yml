name: Build Dev Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: tag
        run: echo "tag=dev-$(date +'%d.%m.%Y-%H.%M.%S')" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/kreuzbube88/helledger:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - run: |
          echo "### Dev image published" >> $GITHUB_STEP_SUMMARY
          echo "Image: \`ghcr.io/kreuzbube88/helledger:${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
