name: Delete All Packages

on:
  workflow_dispatch:

permissions:
  packages: write

jobs:
  delete-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Delete all package versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching all package versions..."
          versions=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/users/Kreuzbube88/packages/container/helledger/versions" \
            --paginate \
            --jq '.[].id')

          if [ -z "$versions" ]; then
            echo "No package versions found."
            exit 0
          fi

          count=$(echo "$versions" | wc -w)
          echo "Found $count version(s). Deleting..."

          for id in $versions; do
            echo "Deleting version $id..."
            gh api \
              --method DELETE \
              -H "Accept: application/vnd.github+json" \
              "/users/Kreuzbube88/packages/container/helledger/versions/$id"
          done

          echo "Done — all $count version(s) deleted."
